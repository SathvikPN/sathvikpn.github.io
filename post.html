<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathvik PN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="wrapper">
        <main>
            <section class="container">
                <div style="margin-bottom: 2rem;">
                    <a href="writes.html"
                        style="font-size: 0.875rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        writings
                    </a>
                </div>

                <article id="post-content" class="body-text" style="max-width: 672px;">
                    <!-- Content will be loaded here -->
                    <div style="display: flex; justify-content: center; padding: 2rem;">
                        <div
                            style="width: 1.5rem; height: 1.5rem; border: 2px solid var(--border-color); border-top-color: var(--text-primary); border-radius: 50%; animation: spin 1s linear infinite;">
                        </div>
                    </div>
                </article>

                <style>
                    @keyframes spin {
                        to {
                            transform: rotate(360deg);
                        }
                    }

                    /* Markdown Styles */
                    #post-content h1 {
                        font-size: 1.5rem;
                        font-weight: 600;
                        margin-bottom: 1.5rem;
                        color: var(--text-primary);
                        letter-spacing: -0.02em;
                    }

                    #post-content strong {
                        font-weight: 500;
                        color: var(--text-primary);
                    }

                    #post-content p {
                        margin-bottom: 1.5rem;
                        line-height: 1.8;
                        color: var(--text-secondary);
                        text-align: justify;
                    }
                </style>
            </section>
        </main>

        <!-- Footer Placeholder -->
        <div id="footer-placeholder"></div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
